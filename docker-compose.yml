services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PORT=${BACKEND_PORT:-3001}
    extra_hosts:
      - "localhost:host-gateway"
    environment:
      - PORT=${BACKEND_PORT:-3001}
      - SIGNAL_API_URL=http://signal-api:8080  # Internal Docker DNS
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - baileys_auth:/app/baileys_auth_info
    networks:
      - app-network
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - PORT=${CLIENT_PORT:-3000}
        - REACT_APP_API_URL=http://backend:3001  # Internal Docker DNS
    environment:
      - PORT=${CLIENT_PORT:-3000}
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  signal-api:
    image: bbernhard/signal-cli-rest-api
    environment:
      - MODE=json-rpc
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "coolify.proxy=true"  # Enable Coolify proxy for this service
      - "coolify.proxy.domain=signal.yourdomain.com"  # Assign a domain/subdomain
      - "coolify.proxy.port=8080"  # Internal port of the service

volumes:
  baileys_auth:
    driver: local

networks:
  app-network:
    driver: bridge
