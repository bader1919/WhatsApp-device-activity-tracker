version: '3.8'

services:
  backend:
    build:
      context: /data/coolify/source/yglggw8e51wb6bnqeq8tfliq  # Path to your source code
      dockerfile: Dockerfile
      args:
        - PORT=${BACKEND_PORT:-3001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=${BACKEND_PORT:-3001}
      - SIGNAL_API_URL=http://signal-api:8080
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE_URL_BACKEND=https://back.app.bymb.bh
      - SERVICE_FQDN_BACKEND=back.app.bymb.bh
    volumes:
      - yglggw8e51wb6bnqeq8tfliq_baileys-auth:/app/baileys_auth_info
    networks:
      - yglggw8e51wb6bnqeq8tfliq
    restart: unless-stopped
    labels:
      - "coolify.proxy=true"
      - "coolify.proxy.domain=back.app.bymb.bh"
      - "coolify.proxy.port=3001"
      - "coolify.proxy.target_port=3001"
      - "coolify.proxy.ssl=true"
      - "coolify.proxy.websocket=true"
      - "coolify.proxy.websocket.path=/socket.io"

  client:
    build:
      context: /data/coolify/source/yglggw8e51wb6bnqeq8tfliq/client
      dockerfile: Dockerfile
      args:
        - PORT=${CLIENT_PORT:-3000}
        - REACT_APP_API_URL=https://back.app.bymb.bh
    environment:
      - PORT=${CLIENT_PORT:-3000}
      - SERVICE_URL_CLIENT=https://front.app.bymb.bh
      - SERVICE_FQDN_CLIENT=front.app.bymb.bh
    depends_on:
      - backend
    networks:
      - yglggw8e51wb6bnqeq8tfliq
    restart: unless-stopped
    labels:
      - "coolify.proxy=true"
      - "coolify.proxy.domain=front.app.bymb.bh"
      - "coolify.proxy.port=3000"
      - "coolify.proxy.target_port=3000"
      - "coolify.proxy.ssl=true"

  signal-api:
    image: bbernhard/signal-cli-rest-api
    environment:
      - MODE=json-rpc
      - SERVICE_URL_SIGNAL_API=https://api.app.bymb.bh
      - SERVICE_FQDN_SIGNAL_API=api.app.bymb.bh
    networks:
      - yglggw8e51wb6bnqeq8tfliq
    restart: unless-stopped
    labels:
      - "coolify.proxy=true"
      - "coolify.proxy.domain=api.app.bymb.bh"
      - "coolify.proxy.port=8080"
      - "coolify.proxy.target_port=8080"
      - "coolify.proxy.ssl=true"

volumes:
  yglggw8e51wb6bnqeq8tfliq_baileys-auth:
    driver: local

networks:
  yglggw8e51wb6bnqeq8tfliq:
    name: yglggw8e51wb6bnqeq8tfliq
    external: true
