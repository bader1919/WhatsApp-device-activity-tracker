version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PORT=${BACKEND_PORT:-3001}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=${BACKEND_PORT:-3001}
      - SIGNAL_API_URL=http://signal-api:8080  # Internal Docker networking
      - NODE_ENV=${NODE_ENV:-production}
      - SERVICE_URL_BACKEND=https://back.app.bymb.bh
      - SERVICE_FQDN_BACKEND=back.app.bymb.bh
    volumes:
      - baileys_auth:/app/baileys_auth_info  # Persist WhatsApp auth state
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "coolify.proxy=true"
      - "coolify.proxy.domain=${SERVICE_FQDN_BACKEND:-back.app.bymb.bh}"
      - "coolify.proxy.port=${BACKEND_PORT:-3001}"
      - "coolify.proxy.target_port=${BACKEND_PORT:-3001}"
      - "coolify.proxy.ssl=true"
      - "coolify.proxy.websocket=true"  # Critical for Socket.IO WebSocket support

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - PORT=${CLIENT_PORT:-3000}
        - REACT_APP_API_URL=https://back.app.bymb.bh  # Public domain for Socket.IO
    environment:
      - PORT=${CLIENT_PORT:-3000}
      - SERVICE_URL_CLIENT=https://front.app.bymb.bh
      - SERVICE_FQDN_CLIENT=front.app.bymb.bh
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "coolify.proxy=true"
      - "coolify.proxy.domain=${SERVICE_FQDN_CLIENT:-front.app.bymb.bh}"
      - "coolify.proxy.port=${CLIENT_PORT:-3000}"
      - "coolify.proxy.target_port=${CLIENT_PORT:-3000}"
      - "coolify.proxy.ssl=true"

  signal-api:
    image: bbernhard/signal-cli-rest-api
    environment:
      - MODE=json-rpc
      - SERVICE_URL_SIGNAL_API=https://api.app.bymb.bh
      - SERVICE_FQDN_SIGNAL_API=api.app.bymb.bh
    networks:
      - app-network
    restart: unless-stopped
    labels:
      - "coolify.proxy=true"
      - "coolify.proxy.domain=${SERVICE_FQDN_SIGNAL_API:-api.app.bymb.bh}"
      - "coolify.proxy.port=8080"
      - "coolify.proxy.target_port=8080"
      - "coolify.proxy.ssl=true"

volumes:
  baileys_auth:
    driver: local

networks:
  app-network:
    driver: bridge
